spring.datasource.url=jdbc:mysql://localhost:3306/mediconnectdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false

# Payment gateway mode: DEMO or LIVE
payment.gateway.mode=DEMO
payment.gateway.name=RAZORPAY
payment.currency=INR

# Razorpay live configuration (set values when switching to LIVE mode)
payment.razorpay.key-id=
payment.razorpay.key-secret=

# RazorpayX payout configuration for direct doctor settlement
payment.razorpayx.base-url=https://api.razorpay.com/v1
payment.razorpayx.key-id=
payment.razorpayx.key-secret=
payment.razorpayx.account-number=
payment.payout.default-share-percent=100